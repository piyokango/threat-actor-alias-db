name: Update data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch source data
        run: python scripts/fetch_sources.py

      - name: Normalize data
        run: python scripts/normalize.py

      - name: Build public search index
        run: python scripts/build_index.py

      - name: Fetch recent activity candidates
        run: python scripts/fetch_activity.py

      - name: Generate activity candidate report
        run: python scripts/generate_activity_report.py

      - name: Rebuild public search index with published activity
        run: python scripts/build_index.py

      - name: Generate static API
        run: python scripts/generate_api.py

      - name: Validate generated public output
        run: python scripts/validate_output.py

      - name: Generate update report
        run: python scripts/generate_report.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/** data/normalized/** data/public/** data/activity/** docs/data/** docs/api/** reports/**
          git diff --cached --quiet || git commit -m "Update threat actor alias DB data"
          git push
